name: hourly
description: "Minimalist screen-time tracker with hourly check-ins and daily reports."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Per-app screen-time data (Android UsageStatsManager)
  usage_stats: ^2.0.1

  # Hourly check-in + daily report notifications, with inline reply actions
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.0

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
